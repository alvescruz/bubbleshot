name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libpipewire-0.3-dev libdbus-1-dev pkg-config

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build .deb
        run: cargo deb --target ${{ matrix.target }}

      - name: Build .rpm
        run: cargo generate-rpm --target ${{ matrix.target }}

      - name: Prepare assets
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/theoshot dist/theoshot-${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb dist/
          cp target/${{ matrix.target }}/generate-rpm/*.rpm dist/
          cp install.sh dist/install.sh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
