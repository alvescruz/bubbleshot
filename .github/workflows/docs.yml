name: docs
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc +%V)" >> $GITHUB_ENV 
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - name: Install system deps (social + optimize plugins)
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libfreetype6-dev libjpeg-dev libpng-dev libgif-dev pngquant
      - run: pip install mkdocs-material Pillow cairosvg
      - run: mkdocs gh-deploy --force
      - name: Submit sitemap to IndexNow (Bing / Yandex / Seznam)
        if: env.INDEXNOW_API_KEY != ''
        env:
          INDEXNOW_API_KEY: ${{ secrets.INDEXNOW_API_KEY }}
        uses: jakob-bagterp/index-now-submit-sitemap-urls-action@v1
        with:
          host: alvescruz.github.io
          api_key: ${{ secrets.INDEXNOW_API_KEY }}
          api_key_location: https://alvescruz.github.io/theoshot/${{ secrets.INDEXNOW_API_KEY }}.txt
          sitemap_locations: https://alvescruz.github.io/theoshot/sitemap.xml
