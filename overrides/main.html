{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  {% if page %}
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ page.title | default(config.site_name) }} - {{ config.site_name }}" />
  <meta property="og:description" content="{{ page.meta.get('description', config.site_description) }}" />
  <meta property="og:url" content="{{ page.canonical_url }}" />
  <meta property="og:site_name" content="{{ config.site_name }}" />
  <meta property="og:image" content="{{ config.site_url }}assets/logo.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ page.title | default(config.site_name) }} - {{ config.site_name }}" />
  <meta name="twitter:description" content="{{ page.meta.get('description', config.site_description) }}" />
  <meta name="twitter:image" content="{{ config.site_url }}assets/logo.png" />
  <link rel="canonical" href="{{ page.canonical_url }}" />
  {% endif %}
{% endblock %}
