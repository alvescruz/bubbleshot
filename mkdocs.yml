site_name: bubbleshot
site_url: https://alvescruz.github.io/bubbleshot/
site_author: Alteon
site_description: >-
  bubbleshot is a modern screen capture and annotation tool for Linux (GNOME/Wayland).
  Built with Rust, it provides XDG Desktop Portal integration, vector annotations
  (arrows, rectangles, circles, text, blur, pen, step numbers), and native-resolution
  output. A fast, secure alternative to Flameshot and GNOME Screenshot.

copyright: Copyright &copy; 2025 Alteon. MIT License.

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.instant
    - navigation.instant.prefetch
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Troubleshooting: troubleshooting.md
  - Development: development.md
  - Deployment: deployment.md
  - Tags: tags.md

plugins:
  - search
  - tags
  - social:
      cards: true
      cards_layout_options:
        background_color: "#1a1a2e"
        color: "#ffffff"
        font_family: Roboto
  - optimize:
      optimize_png: true
      optimize_jpg: true
      optimize_jpg_quality: 85
      cache: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alvescruz/bubbleshot
    - icon: fontawesome/brands/mastodon
      link: https://fosstodon.org/@alteon

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - md_in_html
