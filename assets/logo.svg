<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="bubble2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)"/>

  <!-- Large bubble -->
  <circle cx="160" cy="160" r="70" fill="url(#bubble1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Medium bubble -->
  <circle cx="250" cy="130" r="45" fill="url(#bubble2)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Small bubble -->
  <circle cx="220" cy="250" r="35" fill="url(#bubble1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Tiny bubble -->
  <circle cx="130" cy="270" r="20" fill="url(#bubble2)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Highlight on large bubble -->
  <ellipse cx="140" cy="135" rx="15" ry="8" fill="rgba(255,255,255,0.4)" transform="rotate(-30 140 135)"/>

  <!-- Highlight on medium bubble -->
  <ellipse cx="240" cy="115" rx="10" ry="5" fill="rgba(255,255,255,0.35)" transform="rotate(-25 240 115)"/>

  <!-- Text -->
  <text x="200" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">bubbleshot</text>
</svg>
